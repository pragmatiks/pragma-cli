name: Update SDK

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "New SDK version (e.g., 0.1.3)"
        required: true
        type: string

jobs:
  update-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update SDK version
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          echo "Updating to SDK v${SDK_VERSION}"

          sed -i "s|pragmatiks-sdk>=.*\"|pragmatiks-sdk>=${SDK_VERSION}\"|" pyproject.toml
          sed -i "s|tag = \"v.*\"|tag = \"v${SDK_VERSION}\"|" pyproject.toml

      - name: Update lockfile (retry on simple-index propagation lag)
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          for ATTEMPT in $(seq 1 60); do
            if OUTPUT=$(uv lock --upgrade-package pragmatiks-sdk 2>&1); then
              echo "$OUTPUT"
              echo "uv lock succeeded on attempt ${ATTEMPT}"
              exit 0
            else
              EXIT=$?
            fi
            if echo "$OUTPUT" | grep -q "only pragmatiks-sdk"; then
              echo "Attempt ${ATTEMPT}/60: simple-index propagation lag; sleeping 10s"
              sleep 10
              continue
            fi
            echo "$OUTPUT"
            echo "uv lock failed with unrelated error"
            exit $EXIT
          done
          echo "Timed out waiting for pragmatiks-sdk==${SDK_VERSION} in simple-index"
          exit 1

      - name: Commit changes
        id: commit
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "fix(deps): update pragmatiks-sdk to v${{ inputs.sdk_version }}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          BRANCH="fix/update-sdk-${SDK_VERSION}"

          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "fix(deps): update pragmatiks-sdk to v${SDK_VERSION}" \
            --body "Automated SDK dependency update to v${SDK_VERSION}."

          gh pr merge --squash
