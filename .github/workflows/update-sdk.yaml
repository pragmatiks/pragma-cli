name: Update SDK

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "New SDK version (e.g., 0.1.3)"
        required: true
        type: string

jobs:
  update-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update SDK version
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          echo "Updating to SDK v${SDK_VERSION}"

          sed -i "s|pragmatiks-sdk>=.*\"|pragmatiks-sdk>=${SDK_VERSION}\"|" pyproject.toml
          sed -i "s|tag = \"v.*\"|tag = \"v${SDK_VERSION}\"|" pyproject.toml

      - name: Wait for PyPI availability
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          echo "Waiting for pragmatiks-sdk==${SDK_VERSION} on PyPI..."
          for i in $(seq 1 60); do
            if curl -s "https://pypi.org/pypi/pragmatiks-sdk/json" | python3 -c "import sys,json; versions=json.load(sys.stdin)['releases'].keys(); sys.exit(0 if '${SDK_VERSION}' in versions else 1)" 2>/dev/null; then
              echo "Found pragmatiks-sdk==${SDK_VERSION} on PyPI"
              exit 0
            fi
            echo "Attempt ${i}/60: not yet available, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for pragmatiks-sdk==${SDK_VERSION}"
          exit 1

      - name: Update lockfile
        run: uv sync --no-sources --all-groups

      - name: Commit changes
        id: commit
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(deps): update pragmatiks-sdk to v${{ inputs.sdk_version }}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SDK_VERSION="${{ inputs.sdk_version }}"
          BRANCH="chore/update-sdk-${SDK_VERSION}"

          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "chore(deps): update pragmatiks-sdk to v${SDK_VERSION}" \
            --body "Automated SDK dependency update to v${SDK_VERSION}."

          gh pr merge --squash --auto
